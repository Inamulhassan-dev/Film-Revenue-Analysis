name: CI

on:
  push:
    branches: ["main", "master", "copilot/**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend – install & smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate sample dataset
        run: |
          mkdir -p dataset
          python - <<'EOF'
          import pandas as pd, numpy as np
          np.random.seed(42); n = 300
          genres_cycle = ['Action','Drama','Comedy','Thriller','Animation','Sci-Fi']
          df = pd.DataFrame({
              'title':        [f'Movie {i+1}' for i in range(n)],
              'budget':       np.random.randint(1_000_000, 250_000_000, n),
              'revenue':      np.random.randint(2_000_000, 1_200_000_000, n),
              'runtime':      np.random.randint(80, 190, n),
              'popularity':   np.random.uniform(10, 120, n),
              'vote_average': np.random.uniform(4.5, 9.2, n),
              'release_date': pd.date_range('2000-01-01', '2024-12-31', periods=n).astype(str),
              'genres':       [genres_cycle[i % 6] for i in range(n)],
          })
          df.to_csv('dataset/movies_metadata.csv', index=False)
          print('Sample dataset created.')
          EOF

      - name: Train ML models
        run: python backend/advanced_train.py

      - name: Smoke-test backend imports
        run: |
          python -c "
          import fastapi, uvicorn, numpy, pandas, sklearn, xgboost, lightgbm, joblib
          print('All backend imports OK')
          "

      - name: Verify model files were created
        run: |
          python - <<'EOF'
          from pathlib import Path
          required = [
              'backend/random_forest.pkl',
              'backend/gradient_boosting.pkl',
              'backend/xgboost.pkl',
              'backend/lightgbm.pkl',
              'backend/ensemble_info.pkl',
              'backend/dataset_stats.pkl',
          ]
          missing = [f for f in required if not Path(f).exists()]
          if missing:
              raise SystemExit(f"Missing model files: {missing}")
          print("All model files present.")
          EOF

  frontend:
    name: Frontend – install & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          CI: false  # treat warnings as warnings, not errors
